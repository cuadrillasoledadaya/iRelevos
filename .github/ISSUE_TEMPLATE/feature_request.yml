name: Feature Request
description: Request a new feature for the Relevos App
title: "[FEATURE] "
labels: ["enhancement", "status:needs-review"]
assignees: []
body:
  - type: checkboxes
    id: pre-flight
    attributes:
      label: Pre-flight Checks
      description: Please complete these checks before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I understand this issue needs status:approved before a PR can be opened
          required: true
  - type: textarea
    id: problem-description
    attributes:
      label: Problem Description
      description: A clear description of the problem or pain point
      placeholder: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: A clear and concise description of what you want to happen
    validations:
      required: true
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected Area
      description: Which part of the app does this affect?
      options:
        - Admin Panel
        - User Interface
        - Database/Supabase
        - API Integration
        - Deployment
        - Documentation
        - Other
      default: 0
    validations:
      required: true
  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: What other approaches have you considered?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, mockups, or examples
      placeholder: Screenshots, mockups, examples, references
    validations:
      required: false